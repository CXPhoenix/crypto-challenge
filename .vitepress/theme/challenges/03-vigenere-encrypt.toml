[meta]
id = "vigenere-encrypt"
title = "維吉尼亞加密"
difficulty = "medium"
tags = ["classical", "polyalphabetic", "encrypt"]
algorithm = "vigenere_encrypt"
testcase_count = 5

[params]
plaintext = { type = "alpha_upper", min_len = 6, max_len = 16 }
key = { type = "alpha_upper", min_len = 3, max_len = 8 }

[description]
text = """
## 維吉尼亞加密

維吉尼亞加密使用一個關鍵字循環地對明文中每個字母做凱薩位移，關鍵字的第 i 個字母決定位移量（A=0, B=1, …, Z=25）。

## 輸入說明

第一行：明文（僅含大寫英文字母，長度 6–16）

第二行：關鍵字（僅含大寫英文字母，長度 3–8，循環使用）

## 輸出說明

輸出一行密文（大寫英文字母）。

## 範例

**輸入：**
```
HELLO
KEY
```

**輸出：**
```
RIJVS
```
"""

[starter_code]
python = """
plaintext = input()
key = input()

result = ""
ki = 0
for ch in plaintext:
    if ch.isalpha():
        shift = ord(key[ki % len(key)]) - ord('A')
        result += chr((ord(ch) - ord('A') + shift) % 26 + ord('A'))
        ki += 1
    else:
        result += ch

print(result)
"""
