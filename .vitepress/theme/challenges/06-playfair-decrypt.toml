[meta]
id = "playfair-decrypt"
title = "Playfair 解密"
difficulty = "hard"
tags = ["classical", "digraph", "decrypt"]
algorithm = "playfair_decrypt"
testcase_count = 5

[params]
plaintext = { type = "alpha_upper", min_len = 6, max_len = 14 }
key = { type = "alpha_upper", min_len = 4, max_len = 10 }

[description]
text = """
## Playfair 解密

給定密文和關鍵字，在 5×5 方格密碼表上以反向規則還原明文（同行左移、同列上移、對角互換）。

## 輸入說明

第一行：密文（僅含大寫英文字母，長度為偶數，6–14）

第二行：關鍵字（僅含大寫英文字母，長度 4–10）

## 輸出說明

輸出一行明文（大寫英文字母）。

## 範例

**輸入：**
```
DBIQ
KEY
```

**輸出：**
```
HELP
```
"""

[starter_code]
python = """
ciphertext = input()
key = input()

def build_square(key):
    seen = set()
    sq = []
    for ch in (key + 'ABCDEFGHIKLMNOPQRSTUVWXYZ'):
        c = 'I' if ch == 'J' else ch
        if c not in seen:
            seen.add(c)
            sq.append(c)
    return [sq[i*5:(i+1)*5] for i in range(5)]

def find_pos(sq, ch):
    c = 'I' if ch == 'J' else ch
    for r, row in enumerate(sq):
        if c in row:
            return r, row.index(c)
    return 0, 0

sq = build_square(key)

result = ''
for i in range(0, len(ciphertext), 2):
    a, b = ciphertext[i], ciphertext[i+1]
    r1, c1 = find_pos(sq, a)
    r2, c2 = find_pos(sq, b)
    if r1 == r2:
        result += sq[r1][(c1-1)%5] + sq[r2][(c2-1)%5]
    elif c1 == c2:
        result += sq[(r1-1)%5][c1] + sq[(r2-1)%5][c2]
    else:
        result += sq[r1][c2] + sq[r2][c1]

print(result)
"""
