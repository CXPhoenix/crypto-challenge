[meta]
id = "aes-ecb-decrypt"
title = "AES-ECB 解密"
difficulty = "hard"
tags = ["symmetric", "aes", "block-cipher", "decrypt"]
algorithm = "aes_ecb_decrypt"
testcase_count = 5

[params]
plaintext_hex = { type = "hex_string", min_len = 32, max_len = 32 }
key_hex = { type = "hex_string", min_len = 32, max_len = 32 }

[description]
text = """
## AES-ECB 解密

給定密文和金鑰，進行 AES-ECB 解密並移除 PKCS#7 填充。

**輸入格式：**
```
密文（十六進位字串，含 PKCS#7 填充）
金鑰（32 個十六進位字元 = 16 位元組）
```

**輸出格式：**
```
明文（十六進位字串，不含填充）
```
"""

[starter_code]
python = """
from Crypto.Cipher import AES
from Crypto.Util.Padding import unpad

ct_hex = input()
key_hex = input()

ciphertext = bytes.fromhex(ct_hex)
key = bytes.fromhex(key_hex)

cipher = AES.new(key, AES.MODE_ECB)
plaintext = unpad(cipher.decrypt(ciphertext), 16)
print(plaintext.hex())
"""
