name: Release Dist Packaging

on:
  release:
    types: [published]
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package dist
        run: |
          cd .vitepress/dist
          tar -czf ../../crypto-challenge-${{ github.ref_name }}.tar.gz .
          zip -r ../../crypto-challenge-${{ github.ref_name }}.zip .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            crypto-challenge-${{ github.ref_name }}.tar.gz
            crypto-challenge-${{ github.ref_name }}.zip
